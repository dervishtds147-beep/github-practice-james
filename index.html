<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RecipeJS - Your Functional Cooking Companion</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h1>🍳 RecipeJS</h1>
<p>Your Functional Cooking Companion</p>
</header>

<main>

<section class="controls">

<div class="filter-buttons">
<button class="filter-btn active" data-filter="all">Show All</button>
<button class="filter-btn" data-filter="easy">Easy</button>
<button class="filter-btn" data-filter="medium">Medium</button>
<button class="filter-btn" data-filter="hard">Hard</button>
<button class="filter-btn" data-filter="quick">Quick Recipes</button>
</div>

<div class="sort-buttons">
<button class="sort-btn active" data-sort="none">Default</button>
<button class="sort-btn" data-sort="name">Name (A-Z)</button>
<button class="sort-btn" data-sort="time">Time (Fastest)</button>
</div>

</section>

<div id="recipe-container"></div>

</main>

<script src="app.js"></script>

</body>
</html>
